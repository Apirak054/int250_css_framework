<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>Google Clone</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>
<body>

    <header>
        <nav>
            <a href="#">Gmail</a>
            <a href="#">Images</a>
            <div class="icon-container">
                <span class="material-symbols-outlined">apps</span>
            </div>
            <button class="sign-in-btn">Sign in</button>
        </nav>
    </header>

    <main>
        <div class="logo-container">
            <img src="./logo.png" alt="Google Logo">
        </div>

        <form class="search-container">
            <div class="search-bar">
                <span class="material-symbols-outlined search-icon">search</span>
                <input type="text" class="search-input">
                <div class="search-tools">
                    <span class="material-symbols-outlined">mic</span>
                    <span class="material-symbols-outlined">center_focus_weak</span>
                </div>
            </div>

            <div class="search-buttons">
                <button type="button">Google Search</button>
                <button type="button">I'm Feeling Lucky</button>
            </div>
        </form>

        <div class="language-offer">
            Google offered in: <a href="#">Pasar Thai</a>
        </div>
    </main>

    <footer>
        <div class="footer-country">Thailand</div>
        <div class="footer-links">
            <div class="links-left">
                <a href="#">About</a>
                <a href="#">Advertising</a>
                <a href="#">Business</a>
                <a href="#">How Search works</a>
            </div>
            <div class="links-right">
                <a href="#">Privacy</a>
                <a href="#">Terms</a>
                <a href="#">Settings</a>
            </div>
        </div>
    </footer>

</body>
</html>
