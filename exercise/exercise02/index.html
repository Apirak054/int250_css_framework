<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap To-Do List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #1e1e2e; color: #fff; }
        .task-card { background-color: #2b2b40; border-radius: 10px; }
        .completed { text-decoration: line-through; opacity: 0.6; }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <h1 class="text-center mb-4">Your Tasks, beautifully organized</h1>

            <div class="card p-3 mb-4 task-card border-0">
                <div class="row g-2">
                    <div class="col-md-6">
                        <input type="text" id="taskInput" class="form-control" placeholder="Add a task... (press Enter)">
                    </div>
                    <div class="col-md-3">
                        <select id="priorityInput" class="form-select">
                            <option value="Low">Low Priority</option>
                            <option value="Medium" selected>Medium Priority</option>
                            <option value="High">High Priority</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <button id="addTaskBtn" class="btn btn-primary w-100">+ Add Task</button>
                    </div>
                </div>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-3">
                <input type="text" id="searchInput" class="form-control w-50" placeholder="Search tasks...">
                <div class="btn-group" role="group">
                    <button type="button" class="btn btn-outline-light active filter-btn" data-filter="all">All</button>
                    <button type="button" class="btn btn-outline-light filter-btn" data-filter="active">Active</button>
                    <button type="button" class="btn btn-outline-light filter-btn" data-filter="completed">Completed</button>
                </div>
            </div>

            <ul id="taskList" class="list-group mb-3">
                </ul>

            <div class="d-flex justify-content-between text-muted">
                <span id="taskCounter">0 tasks total</span>
                <button id="clearCompletedBtn" class="btn btn-sm btn-danger d-none">Clear Completed</button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="editModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content text-dark">
            <div class="modal-header">
                <h5 class="modal-title">Edit Task</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editTaskId">
                <input type="text" id="editTaskTitle" class="form-control mb-2">
                <select id="editTaskPriority" class="form-select">
                    <option value="Low">Low</option>
                    <option value="Medium">Medium</option>
                    <option value="High">High</option>
                </select>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                <button type="button" class="btn btn-primary" id="saveEditBtn">Save changes</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>
</body>
</html>
